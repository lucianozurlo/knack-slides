<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCR Latam - Template Coca Cola</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- <button id="toggleBtn" class="toggle-button">Ver base PPT</button> -->

    <div class="slides-container">

        <!-- Slide 1 -->
        <div class="slide-wrapper">
            <div class="slide" id="slide1">
                <img src="assets/img/coca-cola-logo.svg" class="logo-coca-cola" alt="">
                <div class="TCR">
                    <h4>Technical Consumer Research<br />LATAM</h4>
                    <img src="assets/img/tcr-map.svg" alt="">
                    <div class="grad-op"></div>
                </div>
                <div class="project-info">
                    <h1>PROJECT NAME</h1>
                    <table>
                        <tr>
                            <td>TCR Partner:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>PD Partner:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>Category:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>Human Insights Partner:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>Date:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>Test type:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>INV Number:</td>
                            <td>XX</td>
                        </tr>
                        <tr>
                            <td>Supplier:</td>
                            <td>XX</td>
                        </tr>
                    </table>
                </div>

                <footer>
                    <p class="inv">INV Number: INVXXXXXXX</p>
                    <p class="classified">Classified - Confidential</p>
                    <p class="pagination">1</p>
                    <div class="grad"></div>
                </footer>

            </div>
        </div>

        <!-- Slide 2 -->
        <div class="slide-wrapper">
            <div class="slide" id="slide2"></div>
        </div>

        <!-- Slide 3 -->
        <div class="slide-wrapper">
            <div class="slide" id="slide3"></div>
        </div>

        <!-- Slide 4 -->
        <div class="slide-wrapper">
            <div class="slide" id="slide4"></div>
        </div>

    </div>

    <script src="assets/js/scripts.js"></script>
</body>

</html>
